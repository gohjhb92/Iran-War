name: Update Portfolio Tracker

on:
  schedule:
    # Mon–Fri at 21:00 UTC (5 pm ET, after US market close)
    - cron: "0 21 * * 1-5"
  workflow_dispatch:   # Allow manual runs from the GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest prices
        run: python fetch_prices.py

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracker.csv docs/tracker.csv
          if git diff --staged --quiet; then
            echo "No new data — nothing to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: price update ${DATE}"
            git push
          fi
