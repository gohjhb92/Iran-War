name: Update Food Shock Tracker

on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: food-shock
      - name: Fetch latest prices
        run: python fetch_prices.py
        working-directory: food-shock
      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add food-shock/tracker.csv food-shock/docs/tracker.csv
          if git diff --staged --quiet; then
            echo "No new data."
          else
            git commit -m "chore: food-shock price update $(date -u +%Y-%m-%d)"
            git push
          fi
